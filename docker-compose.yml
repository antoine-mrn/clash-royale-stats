services:
  clash-royale-stats:
    container_name: clash-royale-stats
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.prod
    networks:
      - nginx-network
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
    tmpfs:
      - /app/.next/cache:size=256M,mode=1777

networks:
  nginx-network:
    external: true